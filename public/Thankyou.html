<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Thank You — Praveen J</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Syne:wght@700;800&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --accent: #00e5c3;
            --bg: #060b14;
            --glass: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text: #e2e8f0;
            --muted: #64748b;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            opacity: .3;
        }

        .container {
            position: relative;
            z-index: 1;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 64px 56px;
            text-align: center;
            max-width: 520px;
            width: 100%;
            backdrop-filter: blur(20px);
            animation: popIn .7s cubic-bezier(.175, .885, .32, 1.275) forwards;
        }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(.85);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .icon-wrap {
            width: 80px;
            height: 80px;
            background: rgba(0, 229, 195, .1);
            border: 2px solid rgba(0, 229, 195, .3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 28px;
            font-size: 36px;
            animation: bounceIn .8s .3s ease both;
        }

        @keyframes bounceIn {
            from {
                transform: scale(0);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        h1 {
            font-family: 'Syne', sans-serif;
            font-size: clamp(32px, 6vw, 48px);
            font-weight: 800;
            color: #fff;
            margin-bottom: 16px;
        }

        h1 span {
            color: var(--accent);
        }

        p {
            color: var(--muted);
            font-size: 16px;
            line-height: 1.7;
            margin-bottom: 36px;
        }

        a {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--accent);
            color: var(--bg);
            padding: 13px 30px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            text-decoration: none;
            transition: all .3s;
        }

        a:hover {
            background: #00ffd5;
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(0, 229, 195, .3);
        }

        @media (max-width:480px) {
            .container {
                padding: 44px 28px;
            }
        }
    </style>
</head>

<body>
    <canvas id="c"></canvas>
    <div class="container">
        <div class="icon-wrap">✉️</div>
        <h1>Thank <span>You!</span></h1>
        <p>Your message has been received. I'll get back to you as soon as possible — usually within 24 hours.</p>
        <a href="index.html">← Back to Portfolio</a>
    </div>
    <script>
        const c = document.getElementById('c');
        const ctx = c.getContext('2d');
        c.width = window.innerWidth; c.height = window.innerHeight;
        const dots = Array.from({ length: 60 }, () => ({
            x: Math.random() * c.width, y: Math.random() * c.height,
            r: Math.random() * 1.5 + .5, vx: (Math.random() - .5) * .3, vy: (Math.random() - .5) * .3,
            a: Math.random() * .5 + .1
        }));
        function frame() {
            ctx.clearRect(0, 0, c.width, c.height);
            dots.forEach(d => {
                d.x += d.vx; d.y += d.vy;
                if (d.x < 0 || d.x > c.width) d.vx *= -1;
                if (d.y < 0 || d.y > c.height) d.vy *= -1;
                ctx.beginPath(); ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(0,229,195,${d.a})`; ctx.fill();
            });
            requestAnimationFrame(frame);
        }
        frame();
    </script>
</body>

</html>
