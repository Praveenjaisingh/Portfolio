<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Portfolio Contact</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0f172a;
            font-family: Arial, Helvetica, sans-serif;
        }

        .wrapper {
            padding: 40px 10px;
        }

        .card {
            width: 600px;
            max-width: 100%;
            margin: auto;
            background: #0b1220;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #1f2937;
        }

        .header {
            background: linear-gradient(135deg, #00d4aa, #0f172a);
            color: #ffffff;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            margin: 0;
            font-size: 24px;
        }

        .header p {
            margin-top: 8px;
            font-size: 14px;
            opacity: 0.9;
        }

        .content {
            padding: 30px;
            color: #cbd5e1;
        }

        .content p {
            font-size: 15px;
            line-height: 1.6;
        }

        .info-table {
            width: 100%;
            border-spacing: 0;
            margin-top: 15px;
        }

        .info-table td {
            padding: 12px;
            border: 1px solid #1f2937;
            font-size: 14px;
        }

        .label {
            width: 120px;
            background: #111827;
            color: #00d4aa;
            font-weight: bold;
        }

        .value {
            background: #111827;
        }

        .message-box {
            margin-top: 25px;
            padding: 20px;
            background: #0b2a24;
            border-left: 4px solid #00d4aa;
            border-radius: 8px;
            color: #e2e8f0;
        }

        .footer {
            background: #020617;
            color: #94a3b8;
            padding: 18px;
            text-align: center;
            font-size: 13px;
        }

        .footer strong {
            color: #00d4aa;
        }

        @media(max-width:600px) {
            .card {
                width: 100%;
            }
        }
    </style>
</head>

<body>

    <div class="wrapper">
        <table class="card">
            <tr>
                <td class="header">
                    <h1>📩 New Contact Message</h1>
                    <p>Someone reached you via your portfolio 🚀</p>
                </td>
            </tr>
            <tr>
                <td class="content">
                    <p>
                        Hello <strong style="color:#00d4aa;">Praveen</strong>,<br>
                        You’ve received a new message from your portfolio contact form.
                    </p>
                    <table class="info-table">
                        <tr>
                            <td class="label">👤 Name</td>
                            <td class="value">
                                <span style="color:#ffffff; font-family: Arial, Helvetica, sans-serif;">
                                    {{name}}
                                </span>
                            </td>
                        </tr>
                        <tr>
                            <td class="label">📧 Email</td>
                            <td class="value">
                                <span style="color:#ffffff; font-family: Arial, Helvetica, sans-serif;">
                                    {{email}}
                                </span>
                            </td>
                        </tr>
                    </table>
                    <div class="message-box">
                        <strong>💬 Message</strong>
                        <p style="margin-top:10px; color:#e2e8f0; font-family: Arial, Helvetica, sans-serif;">
                            {{message}}
                        </p>
                    </div>
                </td>
            </tr>
            <tr>
                <td class="footer">
                    <strong>PRAVEEN</strong><br>
                    Portfolio Contact Notification
                </td>
            </tr>
        </table>
    </div>

</body>

</html>
