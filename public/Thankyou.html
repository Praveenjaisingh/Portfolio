<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Thank You</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #0f172a;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            height: 100vh;
            padding: 20px;
            overflow: hidden;
        }

        /* floating glow background */
        body::before {
            content: "";
            position: absolute;
            width: 400px;
            height: 400px;
            background: #00d4aa;
            filter: blur(180px);
            opacity: 0.15;
            top: 10%;
            left: 20%;
            animation: floatGlow 6s ease-in-out infinite;
        }

        @keyframes floatGlow {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-30px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 60px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            animation: fadeIn 0.8s ease forwards;
            border: 1px solid rgba(0, 212, 170, 0.2);
            max-width: 500px;
        }

        h1 {
            font-size: 52px;
            margin-bottom: 15px;
            color: #00d4aa;
            animation: pop 0.8s ease;
        }

        p {
            font-size: 18px;
            margin-bottom: 30px;
            color: #cbd5e1;
            line-height: 1.6;
        }

        a.btn {
            display: inline-block;
            padding: 12px 30px;
            background: #00d4aa;
            color: #0f172a;
            text-decoration: none;
            border-radius: 40px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(0, 212, 170, 0.25);
        }

        a.btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 35px rgba(0, 212, 170, 0.4);
        }

        a.btn:active {
            transform: scale(0.96);
        }

        /* animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes pop {
            0% {
                transform: scale(0.8);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* mobile */
        @media(max-width: 768px) {
            h1 {
                font-size: 34px;
            }

            p {
                font-size: 16px;
            }

            .container {
                padding: 40px 25px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Thank You!</h1>
        <p>Your message has been sent successfully. I will get back to you soon.</p>
        <a href="index.html" class="btn">Back to Home</a>
    </div>
</body>

</html>
